# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets available to the Next.js server.
# Secrets are stored in Cloud Secret Manager — never commit real values.
env:
  - variable: NEXT_PUBLIC_TP_MARKER
    value: "" # your Travelpayouts marker (public, OK to expose)
    availability:
      - BUILD
      - RUNTIME
  # - variable: RESEND_API_KEY
  #   secret: RESEND_API_KEY
  #   availability:
  #     - RUNTIME
  # - variable: TP_API_TOKEN
  #   secret: TP_API_TOKEN
  #   availability:
  #     - RUNTIME
