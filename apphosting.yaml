# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_GA_ID
    value: "G-MKT7NFWJ5Z"
    availability:
      - BUILD
      - RUNTIME
